<!DOCTYPE html>
<html lang="tr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yaz Dağları Radyo</title>
<meta name="description" content="Yaz Dağları kokteyl bar — yaz akşamları için seçilmiş müzik yayını.">

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍉</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Gece Orijinal Renkleri */
    --dusk-deep:#161029;
    --dusk-mid:#5c3350;
    --dusk-warm:#c96a3e;
    --gold:#d9b878;
    --gold-bright:#f0d9a8;
    --cream:#f4ead9;
    --mountain-far:#2a2140;
    --mountain-near:#120d1f;
    --ui-line: rgba(244,234,217,0.18);
    --bg-lcd: rgba(18,13,31,0.55);
    --footer-opacity: 0.4;
  }

  /* Gündüz Modu: Tepeden Kumsal / Koy Bakışı */
  html.day-mode {
    --dusk-deep: #0077b6;    
    --dusk-mid: #00b4d8;     
    --dusk-warm: #90e0ef;    
    --gold: #0077b6;         
    --gold-bright: #03045e;  
    --cream: #03045e;        
    --mountain-far: #48cae4; 
    --mountain-near: #f3c68f;
    --ui-line: rgba(3,4,94,0.15);
    --bg-lcd: rgba(255, 255, 255, 0.45); 
    --footer-opacity: 0.7;   
  }
  
  *{box-sizing:border-box;}
  
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden; position: fixed;
  }
  body{ font-family:'Inter',sans-serif; color:var(--cream); background:var(--dusk-deep); display:flex; flex-direction:column; transition: color 0.5s ease; }
  
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- Sky ---------- */
  .sky{ position:absolute; inset:0; z-index:0; background: radial-gradient(120% 90% at 50% 100%, var(--dusk-warm) 0%, var(--dusk-mid) 42%, var(--dusk-deep) 78%); transition: background 0.5s ease;}
  html.day-mode .sky {
    background: linear-gradient(180deg, #4ea8de 0%, #90e0ef 60%, #caf0f8 100%);
  }

  .stars{ 
    position:absolute; inset:0; z-index:1; opacity:0.55; 
    background-image: 
      radial-gradient(1.5px 1.5px at 12% 18%, var(--cream), transparent), 
      radial-gradient(1px 1px at 28% 30%, var(--cream), transparent), 
      radial-gradient(1.5px 1.5px at 45% 12%, var(--cream), transparent), 
      radial-gradient(1px 1px at 62% 22%, var(--cream), transparent), 
      radial-gradient(1.5px 1.5px at 78% 15%, var(--cream), transparent), 
      radial-gradient(1px 1px at 88% 28%, var(--cream), transparent),
      radial-gradient(1.5px 1.5px at 20% 42%, var(--cream), transparent),
      radial-gradient(1px 1px at 70% 40%, var(--cream), transparent);
    background-repeat:no-repeat; transition: opacity 0.4s ease; 
  }
  html.day-mode .stars { opacity: 0; }

  /* ---------- Scenery Layer ---------- */
  .scenery{position:absolute; inset:0; z-index:2; pointer-events:none;}
  .scenery svg{position:absolute; bottom:0; width:100%; height:auto;}
  
  /* Gece Keskin Dağları */
  .mt-night { display: block; }
  .mt-night .mt-far { fill: var(--mountain-far); }
  .mt-night .mt-near { fill: var(--mountain-near); }
  
  /* Gündüz Organik Kumsal Hatları */
  .beach-day { display: none; }
  .beach-day .water-line { fill: var(--mountain-far); opacity: 0.6; }
  .beach-day .sand-line { fill: var(--mountain-near); }

  /* Temaya Göre Katman Kontrolü */
  html.day-mode .mt-night { display: none; }
  html.day-mode .beach-day { display: block; }
  
  /* ---------- Layout ---------- */
  .wrap{ position:relative; z-index:5; height:100%; display:flex; flex-direction:column; justify-content: space-between; }
  
  header{ 
    padding:clamp(20px, 4vh, 40px) clamp(20px, 5vw, 56px) 0;
    display:flex; align-items:center; justify-content:space-between; flex-shrink: 0; 
  }
  .brand{ font-family:'Fraunces',serif; font-weight:500; font-size:clamp(18px,2vw,22px); letter-spacing:0.02em; color:var(--gold-bright); text-decoration:none; transition: color 0.5s ease; }
  .brand span{color:var(--cream); opacity:0.7; font-weight:400; font-size:0.85em;}
  
  .header-right{ display:flex; align-items:center; gap:24px; }
  .lang-switch{ display:flex; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.05em; }
  .lang-btn{ background:none; border:none; color:var(--cream); opacity:0.4; cursor:pointer; padding:2px 4px; transition:opacity 0.2s, color 0.5s; font-family:inherit; }
  .lang-btn.active{ opacity:1; color:var(--gold-bright); font-weight:500; }
  
  .live-badge{ display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.12em; color:var(--cream); opacity:0.85; }
  .live-dot{width:7px; height:7px; border-radius:50%; background:#e8735a; box-shadow:0 0 8px #e8735a;}
  body.is-playing .live-dot{animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  main{ 
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; 
    padding:0 20px; gap: clamp(14px, 2.5vh, 28px); width: 100%; max-width: 600px; margin: 0 auto; pointer-events:none; 
  }
  main .lcd, .sun-wrap { pointer-events:auto; }
  
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); opacity:0.85; margin:0; transition: color 0.5s ease; }
  html[lang="en"] .eyebrow { text-transform: none; }
  
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(32px,5.5vh,52px); line-height:1.05; margin:0; color:var(--cream); transition: color 0.5s ease; }
  .tagline{ font-size: clamp(13px, 1.8vh, 15px); color:var(--cream); opacity:0.65; max-width:420px; margin:0; }

  /* ---------- Sun Button ---------- */
  .sun-wrap{ position:relative; width: clamp(150px, 24vh, 230px); aspect-ratio:1/1; margin: 4px 0; }
  .sun-glow{ position:absolute; inset:-30%; border-radius:50%; background:radial-gradient(circle, rgba(240,217,168,0.55) 0%, rgba(240,217,168,0.0) 70%); opacity:0.5; transition:opacity 0.6s ease; }
  html.day-mode .sun-glow { background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(144,224,239,0.0) 70%); }
  
  .sun-wrap.playing .sun-glow{opacity:1; animation:pulse 4s ease-in-out infinite;}
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
  
  .sun-disc{ position:absolute; inset:8%; border-radius:50%; background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--dusk-warm)); box-shadow: 0 0 40px rgba(217,184,120,0.35); transition: background 0.5s, box-shadow 0.5s; }
  html.day-mode .sun-disc { background: linear-gradient(180deg, #ffffff 0%, #fff3b0 60%, #ffbe0b 100%); box-shadow: 0 0 50px rgba(255,255,255,0.7); }
  
  .tune-btn{ position:absolute; inset:0; border:none; background:transparent; cursor:pointer; border-radius:50%; }
  .tune-btn:focus-visible{outline:3px solid var(--cream); outline-offset:6px;}
  
  .play-icon{ position:absolute; left:53%; top:50%; transform:translate(-50%,-50%); width:0; height:0; border-top:14px solid transparent; border-bottom:14px solid transparent; border-left:22px solid var(--mountain-near); transition: border-left-color 0.5s, opacity 0.2s ease; }
  html.day-mode .play-icon { border-left-color: #03045e; }
  
  .pause-icon{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:flex; gap:6px; opacity:0; transition:opacity 0.2s ease; }
  .pause-icon span{width:6px; height:24px; background:var(--mountain-near); display:block; border-radius:2px; transition: background 0.5s;}
  html.day-mode .pause-icon span { background: #03045e; }
  
  .sun-wrap.playing .play-icon{opacity:0;}
  .sun-wrap.playing .pause-icon{opacity:1;}

  /* ---------- LCD Panel ---------- */
  .lcd{ width:100%; max-width:400px; border:1px solid var(--ui-line); border-radius:14px; background:var(--bg-lcd); backdrop-filter:blur(8px); padding:16px 20px; transition: background 0.5s, border 0.5s; }
  .lcd-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .freq{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); letter-spacing:0.08em; transition: color 0.5s ease; }
  .now-playing{ font-family:'Fraunces',serif; font-weight:500; font-size:18px; color:var(--cream); margin:8px 0 2px; min-height:24px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .artist{ font-family:'Inter',sans-serif; font-size:13px; color:var(--cream); opacity:0.55; min-height:16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .progress{ margin-top:12px; height:3px; border-radius:2px; background:var(--ui-line); overflow:hidden; }
  .progress-bar{height:100%; width:0%; background:var(--gold); transition: background 0.5s; }
  
  .controls{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .vol-row{display:flex; align-items:center; gap:10px; flex:1;}
  .vol-row label{font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--cream); opacity:0.6;}
  
  input[type="range"]{ -webkit-appearance:none; appearance:none; flex:1; height:3px; border-radius:2px; background:var(--ui-line); outline:none; }
  input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--gold-bright); cursor:pointer; border:none; }
  input[type="range"]::-moz-range-thumb{ width:13px; height:13px; border-radius:50%; background:var(--gold-bright); cursor:pointer; border:none; }
  
  .status-msg{ font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--cream); opacity:0.5; margin:10px auto 0; min-height:14px; }
  
  footer{ padding:16px 20px 24px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cream); opacity:var(--footer-opacity); flex-shrink: 0; transition: opacity 0.5s ease; }
  footer a{color:var(--gold); text-decoration:none;}

  @media (max-width:520px){
    .sun-wrap{width:min(56vw, 200px);}
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars"></div>

<div class="scenery">
  <!-- GECE MODU: Keskin dağlar -->
  <svg class="mt-night" viewBox="0 0 1440 420" preserveAspectRatio="none">
    <polygon points="0,420 0,220 180,140 340,240 520,110 720,230 900,130 1100,250 1260,160 1440,240 1440,420" class="mt-far"></polygon>
    <polygon points="0,420 0,300 220,230 460,320 700,220 960,330 1200,240 1440,310 1440,420" class="mt-near"></polygon>
  </svg>

  <!-- GÜNDÜZ MODU: Sahil/koy kıvrımları -->
  <svg class="beach-day" viewBox="0 0 1440 420" preserveAspectRatio="none">
    <path class="water-line" d="M0,420 L0,180 C320,125 420,270 780,150 C1120,30 1220,205 1440,130 L1440,420 Z"></path>
    <path class="sand-line" d="M0,420 L0,275 C270,240 380,355 720,250 C1000,160 1180,330 1440,215 L1440,420 Z"></path>
  </svg>
</div>

<div class="wrap">
  <header>
    <a class="brand" href="#">Yaz Dağları <span>Radyo</span></a>
    <div class="header-right">
      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('tr')">TR</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
      </div>
      <div class="live-badge" id="liveBadge"><span class="live-dot"></span> CANLI YAYIN</div>
    </div>
  </header>

  <main>
    <p class="eyebrow" id="eyebrowText">87.6 · Yaz Akşamı Frekansı</p>
    <h1 id="mainTitle">Gün batarken<br>başlıyor.</h1>
    <p class="tagline" id="taglineText">Yaz Dağları'nın kokteyl saatine eşlik eden sürekli yayın.</p>

    <div class="sun-wrap" id="sunWrap">
      <div class="sun-glow"></div>
      <div class="sun-disc"></div>
      <button class="tune-btn" id="playBtn" aria-label="Yayını başlat / duraklat">
        <span class="play-icon"></span>
        <span class="pause-icon"><span></span><span></span></span>
      </button>
    </div>

    <div class="lcd">
      <div class="lcd-row">
        <span class="freq" id="clock">--:--</span>
        <span class="freq">87.6 MHz</span>
      </div>
      <p class="now-playing" id="trackTitle">Yaz Chillhop Seçkisi</p>
      <p class="artist" id="trackArtist">Canlı Yayın Akışı</p>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="controls">
        <div class="vol-row">
          <label for="vol">SES</label>
          <input type="range" id="vol" min="0" max="100" value="70">
        </div>
      </div>
      <p class="status-msg" id="statusMsg">Başlatmak için güneşe dokun.</p>
    </div>
  </main>

  <footer id="footerText">Afiyet olsun · 2026 © Yaz Dağları</footer>
</div>

<script>
const htmlRoot = document.getElementById('htmlRoot');
const sunWrap = document.getElementById('sunWrap');
const playBtn = document.getElementById('playBtn');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const statusMsg = document.getElementById('statusMsg');
const clock = document.getElementById('clock');
const vol = document.getElementById('vol');
const progressBar = document.getElementById('progressBar');

const streamUrl = "https://stream.nightride.fm/chillsynth.mp3";
let audio = null;
let isPlaying = false;
let progressInterval;
let width = 0;
let currentLang = 'tr';

const i18n = {
  tr: {
    live: '<span class="live-dot"></span> CANLI YAYIN',
    footer: 'Afiyet olsun · 2026 © Yaz Dağları',
    msgInitial: 'Başlatmak için güneşe dokun.',
    msgConnecting: 'Canlı yayına bağlanılıyor…',
    msgPlaying: 'Yayında.',
    msgPaused: 'Duraklatıldı.',
    msgError: 'Bağlantı kurulamadı.',
    trackTitle: 'Yaz Chillhop Seçkisi',
    trackArtist: 'Canlı Yayın Akışı',
    // Gece Metinleri
    night: {
      eyebrow: '87.6 · YAZ AKŞAMI FREKANSI',
      title: 'Gün batarken<br>başlıyor.',
      tagline: 'Yaz Dağları\'nın kokteyl saatine eşlik eden sürekli yayın.'
    },
    // Gündüz Metinleri (Kumsal Modu)
    day: {
      eyebrow: '87.6 · SAHİL AKUSTİK FREKANSI',
      title: 'Güneş tepedeyken<br>serinletir.',
      tagline: 'Kumsal saatine ve dalga seslerine eşlik eden sürekli yayın.'
    }
  },
  en: {
    live: '<span class="live-dot"></span> LIVE STREAM',
    footer: 'Enjoy · 2026 © Summer Mountains',
    msgInitial: 'Tap the sun to listen.',
    msgConnecting: 'Connecting to live stream…',
    msgPlaying: 'On Air.',
    msgPaused: 'Paused.',
    msgError: 'Connection failed.',
    trackTitle: 'Summer Chillhop Selection',
    trackArtist: 'Live Stream',
    // Gece Metinleri
    night: {
      eyebrow: '87.6 · FREQUENCY of SUMMER EVENINGS',
      title: 'Starts as<br>the sun sets.',
      tagline: 'A continuous stream accompanying the cocktail hour of the Summer Nights.'
    },
    // Gündüz Metinleri (Beach Mode)
    day: {
      eyebrow: '87.6 · BEACH ACOUSTIC FREQUENCY',
      title: 'Cools you down<br>under the sun.',
      tagline: 'A continuous stream accompanying the beach hours and the sound of waves.'
    }
  }
};

function isNightTime() {
  const hr = new Date().getHours();
  return hr < 6 || hr >= 19; 
}

function updateTexts() {
  const mode = isNightTime() ? 'night' : 'day';
  const langData = i18n[currentLang];
  
  document.getElementById('liveBadge').innerHTML = langData.live;
  document.getElementById('footerText').textContent = langData.footer;
  trackTitle.textContent = langData.trackTitle;
  trackArtist.textContent = langData.trackArtist;
  
  // Temaya ve dile göre değişen ana metinler
  document.getElementById('eyebrowText').textContent = langData[mode].eyebrow;
  document.getElementById('mainTitle').innerHTML = langData[mode].title;
  document.getElementById('taglineText').textContent = langData[mode].tagline;
  
  // Durum mesajı güncellemesi
  if (!audio) {
    statusMsg.textContent = langData.msgInitial;
  } else if (isPlaying) {
    statusMsg.textContent = langData.msgPlaying;
  } else {
    statusMsg.textContent = langData.msgPaused;
  }
}

function setLanguage(lang) {
  currentLang = lang;
  htmlRoot.setAttribute('lang', lang);
  
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
  });
  
  updateTexts();
}

function togglePlay() {
  if (!isPlaying) {
    statusMsg.textContent = i18n[currentLang].msgConnecting;
    
    audio = new Audio(streamUrl);
    audio.volume = vol.value / 100;
    
    audio.play()
      .then(() => {
        isPlaying = true;
        sunWrap.classList.add('playing');
        document.body.classList.add('is-playing');
        statusMsg.textContent = i18n[currentLang].msgPlaying;
        
        progressInterval = setInterval(() => {
          width = (width + 0.4) % 100;
          progressBar.style.width = width + '%';
        }, 1000);
      })
      .catch(error => {
        console.error("Audio Playback Error:", error);
        statusMsg.textContent = i18n[currentLang].msgError;
      });
  } else {
    isPlaying = false;
    if (audio) {
      audio.pause();
      audio.src = "";
      audio = null;
    }
    sunWrap.classList.remove('playing');
    document.body.classList.remove('is-playing');
    statusMsg.textContent = i18n[currentLang].msgPaused;
    clearInterval(progressInterval);
    progressBar.style.width = '0%';
  }
}

playBtn.addEventListener('click', togglePlay);

vol.addEventListener('input', () => {
  if (audio) {
    audio.volume = vol.value / 100;
  }
});

function checkTheme() {
  const night = isNightTime();
  const hasDayClass = htmlRoot.classList.contains('day-mode');
  
  if (!night && !hasDayClass) {
    htmlRoot.classList.add('day-mode');
    updateTexts(); // Tema değiştiğinde metinleri güncelle
  } else if (night && hasDayClass) {
    htmlRoot.classList.remove('day-mode');
    updateTexts(); // Tema değiştiğinde metinleri güncelle
  }
}

function updateClock() {
  const now = new Date();
  clock.textContent = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');
  checkTheme();
}

// İlk açılışta metinleri yerleştir
updateTexts();

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
