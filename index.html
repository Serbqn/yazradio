<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaz Dağları Radyo</title>
<meta name="description" content="Yaz Dağları kokteyl bar — yaz akşamları için seçilmiş müzik yayını.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --dusk-deep:#161029;
    --dusk-mid:#5c3350;
    --dusk-warm:#c96a3e;
    --gold:#d9b878;
    --gold-bright:#f0d9a8;
    --cream:#f4ead9;
    --mountain-far:#2a2140;
    --mountain-near:#120d1f;
    --ui-line: rgba(244,234,217,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--cream);
    background:var(--dusk-deep);
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- Sky ---------- */
  .sky{
    position:fixed;
    inset:0;
    z-index:0;
    background: radial-gradient(120% 90% at 50% 100%, var(--dusk-warm) 0%, var(--dusk-mid) 42%, var(--dusk-deep) 78%);
  }
  .stars{
    position:fixed; inset:0; z-index:1; opacity:0.55;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 18%, var(--cream), transparent),
      radial-gradient(1px 1px at 28% 30%, var(--cream), transparent),
      radial-gradient(1.5px 1.5px at 45% 12%, var(--cream), transparent),
      radial-gradient(1px 1px at 62% 22%, var(--cream), transparent),
      radial-gradient(1.5px 1.5px at 78% 15%, var(--cream), transparent),
      radial-gradient(1px 1px at 88% 28%, var(--cream), transparent),
      radial-gradient(1.5px 1.5px at 20% 42%, var(--cream), transparent),
      radial-gradient(1px 1px at 70% 40%, var(--cream), transparent);
    background-repeat:no-repeat;
  }

  /* ---------- Mountains ---------- */
  .mountains{position:fixed; inset:0; z-index:2; pointer-events:none;}
  .mountains svg{position:absolute; bottom:0; width:100%; height:auto;}

  /* ---------- Sun / dial ---------- */
  .sun-wrap{
    position:relative;
    width:min(52vw, 300px);
    aspect-ratio:1/1;
    margin: 8px auto 20px;
    pointer-events:auto;
  }
  .sun-glow{
    position:absolute; inset:-30%; border-radius:50%;
    background:radial-gradient(circle, rgba(240,217,168,0.55) 0%, rgba(240,217,168,0.0) 70%);
    opacity:0.5; transition:opacity 0.6s ease;
  }
  .sun-wrap.playing .sun-glow{opacity:1; animation:pulse 4s ease-in-out infinite;}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  .sun-disc{
    position:absolute; inset:8%; border-radius:50%;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--dusk-warm));
    box-shadow: 0 0 60px rgba(217,184,120,0.35);
  }
  .tune-btn{
    position:absolute; inset:0; border:none; background:transparent; cursor:pointer;
    border-radius:50%;
  }
  .tune-btn:focus-visible{outline:3px solid var(--cream); outline-offset:6px;}
  .play-icon{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:0; height:0;
    border-top:16px solid transparent;
    border-bottom:16px solid transparent;
    border-left:26px solid var(--mountain-near);
    transition:opacity 0.2s ease;
  }
  .pause-icon{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    display:flex; gap:8px; opacity:0;
    transition:opacity 0.2s ease;
  }
  .pause-icon span{width:8px; height:30px; background:var(--mountain-near); display:block; border-radius:2px;}
  .sun-wrap.playing .play-icon{opacity:0;}
  .sun-wrap.playing .pause-icon{opacity:1;}
  .sun-wrap:not(.playing) .play-icon{opacity:1;}

  /* ---------- Layout ---------- */
  .wrap{position:relative; z-index:5; flex:1; display:flex; flex-direction:column; min-height:100vh;}

  header{
    padding:clamp(20px,4vw,40px) clamp(20px,5vw,56px) 0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(18px,2vw,22px);
    letter-spacing:0.02em;
    color:var(--gold-bright);
    text-decoration:none;
  }
  .brand span{color:var(--cream); opacity:0.7; font-weight:400; font-size:0.85em;}
  .live-badge{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px; letter-spacing:0.12em;
    color:var(--cream); opacity:0.85;
  }
  .live-dot{width:7px; height:7px; border-radius:50%; background:#e8735a; box-shadow:0 0 8px #e8735a;}
  body.is-playing .live-dot{animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    text-align:center; padding:clamp(28px,6vh,64px) 20px 0;
    pointer-events:none;
  }
  main .lcd{ pointer-events:auto; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--gold); opacity:0.85; margin:0 0 14px;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:600; font-optical-sizing:auto;
    font-size:clamp(38px,7vw,72px); line-height:1.02; margin:0 0 10px;
    color:var(--cream);
  }
  .tagline{
    font-size:15px; color:var(--cream); opacity:0.65; max-width:420px; margin:0;
  }

  /* ---------- LCD panel ---------- */
  .lcd{
    margin-top:44px;
    width:min(92vw, 460px);
    border:1px solid var(--ui-line);
    border-radius:14px;
    background:rgba(18,13,31,0.55);
    backdrop-filter:blur(6px);
    padding:18px 22px;
  }
  .lcd-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .freq{
    font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold);
    letter-spacing:0.08em;
  }
  .now-playing{
    font-family:'Fraunces',serif; font-weight:500; font-size:19px;
    color:var(--cream); margin:10px 0 2px; min-height:26px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .artist{
    font-family:'Inter',sans-serif; font-size:13px; color:var(--cream); opacity:0.55;
    min-height:18px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress{
    margin-top:14px; height:3px; border-radius:2px; background:var(--ui-line); overflow:hidden;
  }
  .progress-bar{height:100%; width:0%; background:var(--gold); transition:width 0.4s ease;}

  .controls{
    display:flex; align-items:center; justify-content:space-between; margin-top:16px;
  }
  .vol-row{display:flex; align-items:center; gap:10px; flex:1;}
  .vol-row label{font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--cream); opacity:0.6;}
  input[type="range"]{
    -webkit-appearance:none; appearance:none;
    flex:1; height:3px; border-radius:2px; background:var(--ui-line); outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
    background:var(--gold-bright); cursor:pointer; border:none;
  }
  input[type="range"]::-moz-range-thumb{
    width:13px; height:13px; border-radius:50%; background:var(--gold-bright); cursor:pointer; border:none;
  }
  .status-msg{
    font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--cream); opacity:0.5;
    margin-top:10px; min-height:14px;
  }

  footer{
    padding:26px 20px 30px; text-align:center;
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em;
    color:var(--cream); opacity:0.4;
  }
  footer a{color:var(--gold); opacity:0.9; text-decoration:none;}

  @media (max-width:520px){
    .sun-wrap{width:min(60vw, 240px);}
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars"></div>

<div class="mountains">
  <svg viewBox="0 0 1440 420" preserveAspectRatio="none">
    <polygon points="0,420 0,220 180,140 340,240 520,110 720,230 900,130 1100,250 1260,160 1440,240 1440,420" fill="#2a2140"></polygon>
    <polygon points="0,420 0,300 220,230 460,320 700,220 960,330 1200,240 1440,310 1440,420" fill="#120d1f"></polygon>
  </svg>
</div>

<div class="wrap">
  <header>
    <a class="brand" href="https://yazdaglari.vercel.app">Yaz Dağları <span>Radyo</span></a>
    <div class="live-badge"><span class="live-dot"></span> CANLI YAYIN</div>
  </header>

  <main>
    <p class="eyebrow">87.6 · Yaz Akşamı Frekansı</p>
    <h1>Gün batarken<br>başlıyor.</h1>
    <p class="tagline">Yaz Dağları'nın kokteyl saatine eşlik eden, seçilmiş parçalardan oluşan sürekli yayın.</p>

    <div class="sun-wrap" id="sunWrap">
      <div class="sun-glow"></div>
      <div class="sun-disc"></div>
      <button class="tune-btn" id="playBtn" aria-label="Yayını başlat / duraklat">
        <span class="play-icon"></span>
        <span class="pause-icon"><span></span><span></span></span>
      </button>
    </div>

    <div class="lcd">
      <div class="lcd-row">
        <span class="freq" id="clock">--:--</span>
        <span class="freq" id="stationTag">CANLI</span>
      </div>
      <p class="now-playing" id="trackTitle">Yayın yükleniyor…</p>
      <p class="artist" id="trackArtist">&nbsp;</p>
      
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="controls">
        <div class="vol-row">
          <label for="vol">SES</label>
          <input type="range" id="vol" min="0" max="100" value="70">
        </div>
      </div>
      <p class="status-msg" id="statusMsg">Oynatıcı hazırlanıyor...</p>
    </div>
  </main>

  <footer>
    Afiyet olsun · <a href="https://yazdaglari.vercel.app">yazdaglari.vercel.app</a> · 2026 © Yaz Dağları
  </footer>
</div>

<!-- Arka Planda Görünmez SoundCloud Widget'ı (Local & CORS Korumalı) -->
<iframe id="sc-player" style="position:absolute; top:-9999px; width:1px; height:1px; opacity:0;" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1472559310&auto_play=false&show_artwork=false" scrolling="no" frameborder="no" allow="autoplay"></iframe>

<!-- SoundCloud Widget API -->
<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
/* ============================================================
   YAZ DAĞLARI RADYO — SoundCloud Kurşun Geçirmez Sürüm
   ============================================================ */

const sunWrap = document.getElementById('sunWrap');
const playBtn = document.getElementById('playBtn');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const statusMsg = document.getElementById('statusMsg');
const clock = document.getElementById('clock');
const vol = document.getElementById('vol');
const progressBar = document.getElementById('progressBar');

const iframe = document.getElementById('sc-player');
const widget = SC.Widget(iframe);

let isPlaying = false;

// 1. Oynatıcı Hazır Olduğunda
widget.bind(SC.Widget.Events.READY, () => {
  statusMsg.textContent = "Başlatmak için güneşe dokun.";
  setVolume(vol.value);
  
  // İlk parçanın bilgisini çek
  updateTrackInfo();
});

// 2. Play / Pause Tetikleyicisi
function togglePlay() {
  if (!isPlaying) {
    statusMsg.textContent = "Yayına bağlanılıyor…";
    widget.play();
  } else {
    widget.pause();
  }
}

// 3. SoundCloud Durum Takipleri
widget.bind(SC.Widget.Events.PLAY, () => {
  isPlaying = true;
  sunWrap.classList.add('playing');
  document.body.classList.add('is-playing');
  statusMsg.textContent = "Yayında.";
  updateTrackInfo();
});

widget.bind(SC.Widget.Events.PAUSE, () => {
  isPlaying = false;
  sunWrap.classList.remove('playing');
  document.body.classList.remove('is-playing');
  statusMsg.textContent = "Duraklatıldı.";
});

// Şarkı değiştikçe arayüz metinlerini güncelle
widget.bind(SC.Widget.Events.PLAY_PROGRESS, (data) => {
  if (isPlaying) {
    const percentage = data.relativePosition * 100;
    progressBar.style.width = `${percentage}%`;
  }
});

function updateTrackInfo() {
  widget.getCurrentSound((sound) => {
    if (sound) {
      // Şarkı adı ve sanatçıyı parçala veya ata
      let title = sound.title || "Yaz Chillhop Seçkisi";
      let artist = sound.user ? sound.user.username : "Yaz Dağları";
      
      if (title.includes('-')) {
        const parts = title.split('-');
        artist = parts[0].trim();
        title = parts[1].trim();
      }
      
      trackTitle.textContent = title;
      trackArtist.textContent = artist;
    }
  });
}

// Ses Kontrolü (SoundCloud 0-1 arası çalışır)
function setVolume(value) {
  const fraction = value / 100;
  widget.setVolume(fraction);
}

vol.addEventListener('input', () => {
  setVolume(vol.value);
});

playBtn.addEventListener('click', togglePlay);

// Sağ üst saat
function updateClock() {
  const now = new Date();
  clock.textContent = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
