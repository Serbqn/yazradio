<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yaz Dağları Radyo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --dusk-deep:#161029;
    --dusk-mid:#5c3350;
    --dusk-warm:#c96a3e;
    --gold:#d9b878;
    --gold-bright:#f0d9a8;
    --cream:#f4ead9;
    --mountain-far:#2a2140;
    --mountain-near:#120d1f;
    --ui-line: rgba(244,234,217,0.18);
  }
  *{box-sizing:border-box;}
  
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden; position: fixed;
  }
  body{ font-family:'Inter',sans-serif; color:var(--cream); background:var(--dusk-deep); display:flex; flex-direction:column; }
  .sky{ position:absolute; inset:0; z-index:0; background: radial-gradient(120% 90% at 50% 100%, var(--dusk-warm) 0%, var(--dusk-mid) 42%, var(--dusk-deep) 78%);}
  .stars{ position:absolute; inset:0; z-index:1; opacity:0.55; background-image: radial-gradient(1.5px 1.5px at 12% 18%, var(--cream), transparent), radial-gradient(1px 1px at 28% 30%, var(--cream), transparent), radial-gradient(1.5px 1.5px at 45% 12%, var(--cream), transparent), radial-gradient(1px 1px at 62% 22%, var(--cream), transparent), radial-gradient(1.5px 1.5px at 78% 15%, var(--cream), transparent), radial-gradient(1px 1px at 88% 28%, var(--cream), transparent); background-repeat:no-repeat; }
  .mountains{position:absolute; inset:0; z-index:2; pointer-events:none;}
  .mountains svg{position:absolute; bottom:0; width:100%; height:auto;}
  
  .wrap{ position:relative; z-index:5; height: 100%; display:flex; flex-direction:column; justify-content: space-between; padding: clamp(20px, 4vh, 40px) clamp(20px, 5vw, 56px); }
  header{ display:flex; align-items:center; justify-content:space-between; flex-shrink: 0; }
  .brand{ font-family:'Fraunces',serif; font-weight:500; font-size:clamp(18px,2vw,22px); letter-spacing:0.02em; color:var(--gold-bright); text-decoration:none; }
  .brand span{color:var(--cream); opacity:0.7; font-weight:400; font-size:0.85em;}
  .live-badge{ display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.12em; color:var(--cream); opacity:0.85; }
  .live-dot{width:7px; height:7px; border-radius:50%; background:#e8735a; box-shadow:0 0 8px #e8735a;}
  body.is-playing .live-dot{animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  main{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap: clamp(14px, 2.5vh, 28px); width: 100%; max-width: 600px; margin: 0 auto; }
  .sun-wrap, .lcd-container { pointer-events: auto; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); opacity:0.85; margin:0; }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(32px,5.5vh,52px); line-height:1.05; margin:0; color:var(--cream); }
  .tagline{ font-size: clamp(13px, 1.8vh, 15px); color:var(--cream); opacity:0.65; max-width:420px; margin:0; }

  .sun-wrap{ position:relative; width: clamp(150px, 24vh, 230px); aspect-ratio:1/1; margin: 4px 0; }
  .sun-glow{ position:absolute; inset:-30%; border-radius:50%; background:radial-gradient(circle, rgba(240,217,168,0.55) 0%, rgba(240,217,168,0.0) 70%); opacity:0.5; transition:opacity 0.6s ease; }
  .sun-wrap.playing .sun-glow{opacity:1; animation:pulse 4s ease-in-out infinite;}
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
  .sun-disc{ position:absolute; inset:8%; border-radius:50%; background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--dusk-warm)); box-shadow: 0 0 40px rgba(217,184,120,0.35); }
  .tune-btn{ position:absolute; inset:0; border:none; background:transparent; cursor:pointer; border-radius:50%; }
  
  .play-icon{ position:absolute; left:53%; top:50%; transform:translate(-50%,-50%); width:0; height:0; border-top:14px solid transparent; border-bottom:14px solid transparent; border-left:22px solid var(--mountain-near); }
  .pause-icon{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:flex; gap:6px; opacity:0; }
  .pause-icon span{width:6px; height:24px; background:var(--mountain-near); display:block; border-radius:2px;}
  .sun-wrap.playing .play-icon{opacity:0;}
  .sun-wrap.playing .pause-icon{opacity:1;}

  .lcd-container{ width:100%; max-width:400px; border:1px solid var(--ui-line); border-radius:14px; background:rgba(18,13,31,0.6); backdrop-filter:blur(8px); padding:16px 20px; }
  .lcd-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .freq{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); letter-spacing:0.08em; }
  .now-playing{ font-family:'Fraunces',serif; font-weight:500; font-size:18px; color:var(--cream); margin:8px 0 2px; min-height:24px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .artist{ font-family:'Inter',sans-serif; font-size:13px; color:var(--cream); opacity:0.55; min-height:16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress{ margin-top:12px; height:3px; border-radius:2px; background:var(--ui-line); overflow:hidden; }
  .progress-bar{height:100%; width:0%; background:var(--gold); }
  .status-msg{ font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--cream); opacity:0.5; margin: 12px auto 0; min-height:14px; }
  footer{ padding: 0; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cream); opacity:0.4; flex-shrink: 0; }
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars"></div>
<div class="mountains">
  <svg viewBox="0 0 1440 420" preserveAspectRatio="none">
    <polygon points="0,420 0,220 180,140 340,240 520,110 720,230 900,130 1100,250 1260,160 1440,240 1440,420" fill="#2a2140"></polygon>
    <polygon points="0,420 0,300 220,230 460,320 700,220 960,330 1200,240 1440,310 1440,420" fill="#120d1f"></polygon>
  </svg>
</div>

<div class="wrap">
  <header>
    <a class="brand" href="#">Yaz Dağları <span>Radyo</span></a>
    <div class="live-badge"><span class="live-dot"></span> CANLI YAYIN</div>
  </header>

  <main>
    <p class="eyebrow">87.6 · Yaz Akşamı Frekansı</p>
    <h1>Gün batarken<br>başlıyor.</h1>
    <p class="tagline">Yaz Dağları'nın kokteyl saatine eşlik eden, seçilmiş parçalardan oluşan sürekli yayın.</p>

    <div class="sun-wrap" id="sunWrap">
      <div class="sun-glow"></div>
      <div class="sun-disc"></div>
      <button class="tune-btn" id="playBtn" aria-label="Yayını başlat / duraklat">
        <span class="play-icon"></span>
        <span class="pause-icon"><span></span><span></span></span>
      </button>
    </div>

    <div class="lcd-container">
      <div class="lcd-row">
        <span class="freq" id="clock">--:--</span>
        <span class="freq">87.6 MHz</span>
      </div>
      <p class="now-playing" id="trackTitle">Yaz Chillhop Seçkisi</p>
      <p class="artist" id="trackArtist">Canlı Akış</p>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="status-msg" id="statusMsg">Başlatmak için güneşe dokun.</p>
    </div>
  </main>

  <footer>Afiyet olsun · 2026 © Yaz Dağları</footer>
</div>

<script>
const sunWrap = document.getElementById('sunWrap');
const playBtn = document.getElementById('playBtn');
const statusMsg = document.getElementById('statusMsg');
const clock = document.getElementById('clock');
const progressBar = document.getElementById('progressBar');

// Tarayıcıların en sevdiği, kesintisiz kurumsal Shoutcast MP3 akışı (Radio Monaco)
const streamUrl = "https://ice1.somafm.com/groovesalad-128-mp3";
let audio = null;

let isPlaying = false;
let progressInterval;
let width = 0;

function togglePlay() {
  if (!isPlaying) {
    statusMsg.textContent = "Canlı yayına bağlanılıyor…";
    
    // Her oynatmada yeni bir Audio instance oluşturarak cache ve desteklenen kaynak hatalarını tamamen baypas ediyoruz
    audio = new Audio(streamUrl);
    
    audio.play()
      .then(() => {
        isPlaying = true;
        sunWrap.classList.add('playing');
        document.body.classList.add('is-playing');
        statusMsg.textContent = "Yayında.";
        
        progressInterval = setInterval(() => {
          width = (width + 0.4) % 100;
          progressBar.style.width = width + '%';
        }, 1000);
      })
      .catch(error => {
        console.error("Audio Playback Error:", error);
        statusMsg.textContent = "Bağlantı kurulamadı. (" + error.message + ")";
      });
  } else {
    isPlaying = false;
    if (audio) {
      audio.pause();
      audio.src = ""; // Stream bağlantısını tamamen kopar
      audio = null;   // Hafızadan temizle
    }
    sunWrap.classList.remove('playing');
    document.body.classList.remove('is-playing');
    statusMsg.textContent = "Duraklatıldı.";
    clearInterval(progressInterval);
  }
}

playBtn.addEventListener('click', togglePlay);

function updateClock() {
  const now = new Date();
  clock.textContent = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
